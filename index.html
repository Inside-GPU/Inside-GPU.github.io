<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside-GPU | Unity Asset Store</title>
    <style>
        :root {
            --dark-bg: #0f1115;
            --card-bg: rgba(45, 48, 62, 0.7);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --live-green: #00ff88;
            --incoming-gold: #ffcc00;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, #1c2331 0%, #0f1115 100%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: -2px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .asset-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .asset-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            width: 340px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .asset-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
            border-color: var(--accent);
        }

        /* --- Status Badge Styles --- */
        .status-container {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-live { color: var(--live-green); border: 1px solid var(--live-green); }
        .status-live .dot { 
            background-color: var(--live-green); 
            box-shadow: 0 0 8px var(--live-green);
            animation: pulse 1.5s infinite;
        }

        .status-incoming { color: var(--incoming-gold); border: 1px solid var(--incoming-gold); }
        .status-incoming .dot { background-color: var(--incoming-gold); }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        /* --------------------------- */

        .asset-thumbnail {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
        }

        .card-content { padding: 24px; }
        .asset-title { font-size: 1.4rem; margin: 0 0 10px 0; }
        .asset-description { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 25px; height: 50px; }

        .btn {
            display: block;
            text-align: center;
            padding: 14px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn.disabled {
            background: #444;
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<header>
    <h1>Inside-GPU</h1>
    <p class="subtitle">Unity Tools & Shaders</p>
</header>

<main class="asset-grid">

    <div class="asset-card">
        <div class="status-container status-live">
            <span class="dot"></span> LIVE
        </div>
        <img src="Images/Highlighter Post-processing-1.jpg" alt="Highlighter" class="asset-thumbnail">
        <div class="card-content">
            <h2 class="asset-title">Highlighter Post-processing</h2>
            <p class="asset-description">Advanced post-processing to highlight system.</p>
            <a href="#" class="btn" target="_blank">View on Asset Store</a>
        </div>
    </div>

    <div class="asset-card">
        <div class="status-container status-incoming">
            <span class="dot"></span> INCOMING
        </div>
        <img src="Images/Retro Scanline Post-processing-1.png" alt="Retro Scanline" class="asset-thumbnail">
        <div class="card-content">
            <h2 class="asset-title">Retro Scanline Post-processing</h2>
            <p class="asset-description">Advance retro style post-processing system.</p>
            <a href="#" class="btn disabled">Developing...</a>
        </div>
    </div>

</main>

</body>
</html>
